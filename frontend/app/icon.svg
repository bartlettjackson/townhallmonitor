<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- California State Flag -->
  <!-- White field -->
  <rect width="32" height="32" rx="2" fill="#FFFFFF"/>
  <!-- Red stripe at bottom -->
  <rect y="25" width="32" height="7" fill="#BC2028"/>
  <!-- Bear (simplified silhouette) -->
  <g fill="#8B4513">
    <!-- Body -->
    <ellipse cx="16" cy="15" rx="8" ry="4.5"/>
    <!-- Head -->
    <ellipse cx="9" cy="12.5" rx="3.5" ry="3"/>
    <!-- Snout -->
    <ellipse cx="6.5" cy="13.5" rx="1.8" ry="1.2"/>
    <!-- Ears -->
    <circle cx="7.5" cy="9.8" r="1.2"/>
    <circle cx="11" cy="9.5" r="1.2"/>
    <!-- Legs -->
    <rect x="10" y="18" width="2.5" height="4" rx="1"/>
    <rect x="14" y="18" width="2.5" height="4" rx="1"/>
    <rect x="18" y="18" width="2.5" height="4" rx="1"/>
    <rect x="22" y="17.5" width="2.5" height="4.5" rx="1"/>
    <!-- Hump -->
    <ellipse cx="14" cy="11" rx="4" ry="2.5"/>
    <!-- Tail -->
    <path d="M24 14 Q26 12 25 10" stroke="#8B4513" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Star -->
  <polygon points="7,5.5 7.7,7.5 9.8,7.5 8.1,8.8 8.7,10.8 7,9.5 5.3,10.8 5.9,8.8 4.2,7.5 6.3,7.5" fill="#BC2028"/>
</svg>
